  <style>
    :root {
      --primary: #1a5f2a;
      --primary-light: #2d8a4e;
      --accent: #c9a227;
      --bg: #f8faf7;
      --card: #ffffff;
      --text: #1f2937;
      --text-light: #6b7280;
      --border: #e5e7eb;
      --error: #dc2626;
      --success: #16a34a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .container { max-width: 720px; margin: 0 auto; padding: 24px 16px 48px; }
    .lang-switch { display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 20px; }
    .lang-btn {
      padding: 6px 16px; border: 2px solid var(--border); background: var(--card);
      border-radius: 20px; cursor: pointer; font-size: 14px; font-weight: 500;
      transition: all 0.2s; color: var(--text-light);
    }
    .lang-btn.active { border-color: var(--primary); background: var(--primary); color: white; }
    .lang-btn:hover:not(.active) { border-color: var(--primary-light); color: var(--primary); }
    .header-card {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: white; padding: 32px 24px; border-radius: 16px; text-align: center;
      margin-bottom: 24px; box-shadow: 0 10px 40px rgba(26, 95, 42, 0.15);
    }
    .header-card h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; letter-spacing: 1px; }
    .header-card .subtitle { font-size: 15px; opacity: 0.9; margin-bottom: 16px; }
    .date-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.2); padding: 6px 16px; border-radius: 20px;
      font-size: 14px; font-weight: 500;
    }
    .form-card {
      background: var(--card); border-radius: 16px; padding: 28px 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06); margin-bottom: 20px;
    }
    .section-title {
      font-size: 18px; font-weight: 600; color: var(--primary);
      margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
    .required::after { content: ' *'; color: var(--error); }
    input, select, textarea {
      width: 100%; padding: 12px 14px; border: 2px solid var(--border);
      border-radius: 10px; font-size: 15px; transition: all 0.2s;
      background: var(--card); color: var(--text); font-family: inherit;
    }
    input:focus, select:focus, textarea:focus {
      outline: none; border-color: var(--primary-light);
      box-shadow: 0 0 0 3px rgba(26, 95, 42, 0.1);
    }
    input.error, select.error, textarea.error { border-color: var(--error); }
    .error-msg { color: var(--error); font-size: 12px; margin-top: 4px; display: none; }
    .error-msg.show { display: block; }
    textarea { min-height: 80px; resize: vertical; }
    .checkbox-group {
      display: flex; align-items: flex-start; gap: 10px; padding: 12px;
      background: var(--bg); border-radius: 10px; cursor: pointer; transition: background 0.2s;
    }
    .checkbox-group:hover { background: #eef5ee; }
    .checkbox-group input[type="checkbox"] {
      width: 18px; height: 18px; margin-top: 2px; accent-color: var(--primary); cursor: pointer;
    }
    .checkbox-group label { margin: 0; cursor: pointer; font-size: 14px; color: var(--text-light); line-height: 1.5; }
    .submit-btn {
      width: 100%; padding: 16px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: white; border: none; border-radius: 12px; font-size: 17px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 4px 15px rgba(26, 95, 42, 0.3); letter-spacing: 1px;
    }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(26, 95, 42, 0.4); }
    .submit-btn:active { transform: translateY(0); }
    .success-modal {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); z-index: 100;
      align-items: center; justify-content: center; padding: 20px;
    }
    .success-modal.show { display: flex; }
    .modal-content {
      background: white; padding: 40px 32px; border-radius: 20px;
      text-align: center; max-width: 400px; width: 100%;
      animation: popIn 0.3s ease;
    }
    @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .success-icon {
      width: 64px; height: 64px; background: var(--success); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px; color: white; font-size: 32px;
    }
    .modal-content h2 { color: var(--primary); margin-bottom: 12px; font-size: 22px; }
    .modal-content p { color: var(--text-light); margin-bottom: 24px; line-height: 1.6; }
    .modal-btn {
      padding: 12px 32px; background: var(--primary); color: white;
      border: none; border-radius: 10px; font-size: 15px; cursor: pointer; font-weight: 500;
    }
    .qr-section { margin-top: 16px; padding: 16px; background: var(--bg); border-radius: 12px; text-align: center; }
    .qr-placeholder {
      width: 120px; height: 120px; background: white; border: 2px dashed var(--border);
      border-radius: 8px; margin: 0 auto 8px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-light); font-size: 12px;
    }
  </style>
</head>

        bizFurniture: "Furniture Manufacturing/Wholesale",
        bizRetail: "Furniture Retail",
        bizDesign: "Interior Design",
        bizMaterials: "Materials Supply",
        bizLogistics: "Logistics/Trading",
        bizMedia: "Media/Association",
        multipleDays: "Multiple Days"
      }
    };

    let currentLang = 'zh';

    function setLang(lang) {
      currentLang = lang;
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (i18n[lang][key]) el.textContent = i18n[lang][key];
      });
      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const key = el.dataset.i18nPlaceholder;
        if (i18n[lang][key]) el.placeholder = i18n[lang][key];
      });
      document.querySelectorAll('select option[data-i18n]').forEach(opt => {
        const key = opt.dataset.i18n;
        if (i18n[lang][key]) opt.textContent = i18n[lang][key];
      });
    }

    function validatePhone(phone) {
      const clean = phone.replace(/[\s\-+]/g, '');
      return /^\\d{7,15}$/.test(clean);
    }

    function handleSubmit(e) {
      e.preventDefault();
      let valid = true;
      document.querySelectorAll('.error-msg').forEach(el => el.classList.remove('show'));
      document.querySelectorAll('input, select, textarea').forEach(el => el.classList.remove('error'));
      
      const requiredFields = ['name', 'gender', 'phone', 'company', 'position', 'country', 'business', 'visitDate'];
      requiredFields.forEach(field => {
        const el = document.getElementById(field);
        if (!el.value.trim()) {
          valid = false;
          el.classList.add('error');
          const err = el.parentElement.querySelector('.error-msg');
          if (err) err.classList.add('show');
        }
      });
      
      const phone = document.getElementById('phone');
      if (phone.value && !validatePhone(phone.value)) {
        valid = false;
        phone.classList.add('error');
        phone.parentElement.querySelector('.error-msg').classList.add('show');
      }
      
      const agree = document.getElementById('agree');
      if (!agree.checked) {
        valid = false;
        document.getElementById('agreeError').classList.add('show');
      }
      
      if (valid) {
        const formData = new FormData(document.getElementById('regForm'));
        const data = Object.fromEntries(formData.entries());
        data.interests = Array.from(document.querySelectorAll('input[name=\"interests\"]:checked')).map(cb => cb.value);
        data.language = currentLang;
        data.submitTime = new Date().toISOString();
        console.log('Pre-registration data:', data);
        document.getElementById('successModal').classList.add('show');
      }
    }

    function closeModal() {
      document.getElementById('successModal').classList.remove('show');
      document.getElementById('regForm').reset();
      document.querySelectorAll('.error-msg').forEach(el => el.classList.remove('show'));
      document.querySelectorAll('input, select, textarea').forEach(el => el.classList.remove('error'));
    }

    setLang('zh');
  </script>
</body>
</html>
